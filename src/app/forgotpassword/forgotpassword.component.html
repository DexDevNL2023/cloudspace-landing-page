<div class="px-4 py-8 md:px-6 lg:px-8" style="background: url('assets/images/blocks/signin/signin-2.jpg') no-repeat; background-size: cover;">
    <div class="flex flex-wrap">
        <div class="w-full lg:w-6 p-4 lg:p-7" style="background-color: rgba(255,255,255,.7);">
            <img [src]="app.logoUrl" alt="Image" height="50" class="mb-6">
            <div class="text-xl text-900 font-500 mb-3">Welcome to {{ app.name }}</div>
            <ul class="list-none p-0 m-0">
                <li *ngFor="let item of items" class="flex align-items-start mb-4">
                    <i [ngStyle]="{'color': app.color }" [class]="'pi '+ item.icon + ' text-xl mr-2'"></i>
                    <span [ngStyle]="{'color': app.color }" class="font-medium text-900">{{ item.title }}</span>
                </li>
            </ul>
        </div>
        <div class="w-full lg:w-6 p-4 lg:p-7 surface-card">
            <div class="text-900 text-4xl font-medium mb-6">Forgot password</div>
            <form #forgotPasswordForm="ngForm" (ngSubmit)="forgotPassword()">
                <label for="email" class="block text-900 font-medium mb-2">Email</label>
                <input id="email" type="email" placeholder="Email address" class="p-inputtext p-component p-element w-full mb-4" [(ngModel)]="email" name="email" required>

                <button type="submit" label="Reset password" icon="pi pi-refresh" class="p-element p-ripple w-full p-button p-component">
                    <span class="p-button-icon p-button-icon-left pi pi-refresh" aria-hidden="true"></span>
                    <span class="p-button-label">Reset password</span>
                    <span class="p-ink"></span>
                </button>

                <p-divider align="center" class="p-element">
                    <div role="separator" class="p-divider p-component p-divider-horizontal p-divider-solid p-divider-center">
                        <div class="p-divider-content">
                            <span class="text-600 font-normal text-sm">OR</span>
                        </div>
                    </div>
                </p-divider>
                
                <button type="button" label="Login" icon="pi pi-user" class="p-element p-ripple w-full p-button-secondary p-button p-component" (click)="navigateToLogin()">
                    <span class="p-button-icon p-button-icon-left pi pi-user" aria-hidden="true"></span>
                    <span class="p-button-label">Login</span>
                    <span class="p-ink"></span>
                </button>
            </form>
        </div>
    </div>
</div>
