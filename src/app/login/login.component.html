<div class="surface-ground px-4 py-8 md:px-6 lg:px-8">
    <div class="flex flex-wrap shadow-2">
        <div class="w-full lg:w-6 px-0 py-4 lg:p-7 bg-blue-50">
            <img [src]="app.logoUrl" alt="Image" height="35" class="mb-6">
            <p-carousel indicatorstyleclass="hover:bg-primary-500" class="p-element" [value]="items" [numVisible]="1"
                [numScroll]="1" [circular]="true" [autoplayInterval]="2000">
                <ng-template let-item pTemplate="carousel">
                    <div class="p-carousel-item ng-star-inserted">
                        <div class="text-center mb-8 ng-star-inserted">
                            <img alt="Image" class="pi-" [src]="item.imageUrl">
                            <div class="mx-auto font-medium text-xl mb-4 text-blue-900">
                                {{ item.title }}
                            </div>
                            <p class="m-0 text-blue-700 line-height-3">
                                {{ item.description }}
                            </p>
                        </div>
                    </div>
                </ng-template>
            </p-carousel>
        </div>
        <div class="w-full lg:w-6 p-4 lg:p-7 surface-card">
            <div class="flex align-items-center justify-content-between mb-7">
                <span class="text-2xl font-medium text-900">Create account to {{ app.name }}</span>
            </div>
            <form (ngSubmit)="login()" #loginForm="ngForm">
                <label for="email" class="block text-900 font-medium mb-2">Email</label>
                <input id="email" type="email" placeholder="Email address" pinputtext="" class="p-inputtext p-component p-element w-full mb-3 p-3" [(ngModel)]="email" name="email" required>

                <label for="password" class="block text-900 font-medium mb-2">Password</label>
                <input id="password" type="password" placeholder="Password" pinputtext="" class="p-inputtext p-component p-element w-full mb-3 p-3" [(ngModel)]="password" name="password" required>

                <div class="flex align-items-center justify-content-between mb-6">
                    <div class="flex align-items-center">
                        <p-checkbox id="rememberme" styleclass="mr-2" class="p-element" [(ngModel)]="rememberMe">
                            <div class="mr-2 p-checkbox p-component">
                                <div class="p-hidden-accessible">
                                    <input type="checkbox" value="undefined" aria-checked="false">
                                </div>
                                <div class="p-checkbox-box"></div>
                            </div>
                        </p-checkbox>
                        <label for="rememberme">Remember me</label>
                    </div>
                    <a (click)="forgotPassword()" class="font-medium text-blue-500 hover:text-blue-700 cursor-pointer transition-colors transition-duration-150">Forgot password?</a>
                </div>

                <button pbutton="" label="Sign In" class="p-element p-ripple w-full py-3 font-medium p-button p-component" [disabled]="loginForm.invalid">
                    <span class="p-button-label">Sign In</span>
                    <span class="p-ink"></span>
                </button>
            </form>
        </div>
    </div>
</div>
