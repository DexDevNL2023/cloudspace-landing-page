
<app-herosub [heroContent]="heroContent"></app-herosub>

<!-- ======= Contact Section ======= -->
<section id="contact" class="contact">
    <div class="container aos-init aos-animate" data-aos="fade-up">
        <header class="section-header">
            <p>{{ contactContent.title }}</p>
            <h6>{{ contactContent.description }}</h6>
        </header>
        <div class="row gy-4">
            <div class="col-lg-12">
                <div class="row gy-4">
                    <div *ngFor="let contact of contactContent.contacts" class="col-md-3">
                        <div class="info-box">
                            <i [class]="contact.icon"></i>
                            <h3>{{ contact.label }}</h3>
                            <p>{{ contact.info }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section><!-- End Contact Section -->

<!-- Dans votre fichier HTML -->
<section class="pb-0">
    <iframe [src]="contactContent.mapUrl" width="100%" height="550" style="border:8px solid #00BFF0;" allowfullscreen=""
        loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</section>
