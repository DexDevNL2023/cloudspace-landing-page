<app-herosub [heroContent]="heroContent"></app-herosub>

<main id="main">
    <!-- ======= Contact Section ======= -->
    <section id="contact" class="contact">
        <div class="container aos-init aos-animate" data-aos="fade-up">
            <header class="section-header">
                <p>{{ contactContent.title }}</p>
                <h6>{{ contactContent.description }}</h6>
            </header>
            <div class="row gy-4">
                <div class="col-lg-12">
                    <div class="row gy-4">
                        <div *ngFor="let contact of contactContent.contacts"
                            class="col-md-3 d-flex flex-column justify-content-center">
                            <div class="info-box">
                                <i [class]="contact.icon"></i>
                                <h3>{{ contact.label }}</h3>
                                <p>{{ contact.info }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section><!-- End Contact Section -->

    <!-- Dans votre fichier HTML -->
    <section class="pb-0">
        <div class="px-4 py-4 md:px-6 lg:px-6" style="background-image: url('assets/img/blocks/contacts/contact-2.jpg');">
            <div class="grid">
                <div class="text-white-50 text-6xl text-center font-medium mb-6">Contact Us</div>
                <div class="col-12 md:col-6">
                    <div class="p-fluid pr-0 md:pr-6">
                        <div class="field">
                            <label for="name" class="text-white text-xl font-medium">Name<span style="color: red;">*</span></label>
                            <input id="name" type="text" pInputText [(ngModel)]="name" required
                                class="p-inputtext p-component p-element py-3 px-2 text-lg">
                        </div>
                        <div class="field">
                            <label for="email" class="text-white text-xl font-medium">Email<span style="color: red;">*</span></label>
                            <input id="email" type="email" pInputText [(ngModel)]="email" required
                                class="p-inputtext p-component p-element py-3 px-2 text-lg">
                        </div>
                        <div class="field">
                            <label for="company" class="text-white text-xl font-medium">Company</label>
                            <input id="company" type="text" pInputText [(ngModel)]="company"
                                class="p-inputtext p-component p-element py-3 px-2 text-lg">
                        </div>
                        <div class="field">
                            <label for="message" class="text-white text-xl font-medium">Message<span style="color: red;">*</span></label>
                            <textarea id="message" pInputTextarea rows="6" [(ngModel)]="message" required
                                class="p-inputtextarea p-inputtext p-component p-element py-3 px-2 text-lg p-inputtextarea-resizable"
                                style="height: 158px; overflow: hidden;"></textarea>
                        </div>
                        <button pButton pRipple label="Send Message" icon="pi pi-send"
                            class="p-element p-ripple w-auto p-button p-component"
                            [disabled]="!name || !email || !message" (click)="sendMessage()">
                            <span class="p-button-icon p-button-icon-left pi pi-send" aria-hidden="true"></span>
                            <span class="p-button-label">Send Message</span><span class="p-ink"></span>
                        </button>
                    </div>
                </div>
                <p-toast></p-toast>
            </div>
        </div>
    </section>
</main><!-- End #main -->
