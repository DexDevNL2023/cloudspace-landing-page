
<app-herosub [heroContent]="heroContent"></app-herosub>

<!-- ======= F.A.Q Section ======= -->
<section id="faq" class="faq">
    <div class="container" data-aos="fade-up">
        <header class="section-header">
            <p>Current Openings</p>
        </header>
        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                <!-- F.A.Q List 1-->
                <div class="accordion accordion-flush" id="faqlist1">
                    <div class="accordion-item" *ngFor="let career of careerContent; let i = index">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                [attr.data-bs-target]="'#faq-content-' + i">
                                {{ career.title }}
                            </button>
                        </h2>
                        <div [id]="'faq-content-' + i"
                            class="accordion-collapse collapse" data-bs-parent="#faqlist1">
                            <div class="accordion-body">
                                <h3 class="pt-3">{{ career.title }}</h3>
                                <p><strong>Location:</strong> {{ career.location }}</p>
                                <p>{{ career.description }}</p>
                                <h3>Detailed Responsibilities</h3>
                                <ul>
                                    <li *ngFor="let responsibility of career.responsibilities">{{ responsibility }}</li>
                                </ul>
                                <h3>Required Technical Skills</h3>
                                <ul>
                                    <li *ngFor="let qualification of career.qualifications">{{ qualification }}</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section><!-- End F.A.Q Section -->
